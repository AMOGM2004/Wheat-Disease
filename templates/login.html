<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wheat Disease Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f9f4 0%, #e8f5ee 50%, #f5f9f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(11,42,53,0.10);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            color: #0b2a35;
        }
        .logo p { color: #6b8f7a; font-size: 14px; margin-top: 6px; }

        .alert {
            background: #fde8e8;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .success {
            background: #e8f5ee;
            color: #1a5c40;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .input-group { margin-bottom: 14px; }
        .input-group input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #d4e6dc;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border 0.2s;
            color: #1a2e25;
        }
        .input-group input:focus { border-color: #2ecc71; }

        .btn {
            width: 100%;
            padding: 14px;
            background: #1a5c40;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s;
            margin-top: 6px;
        }
        .btn:hover { background: #0b2a35; }

        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6b8f7a;
        }
        .links a {
            color: #1a5c40;
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover { text-decoration: underline; }

        .divider {
            height: 1px;
            background: #d4e6dc;
            margin: 24px 0;
        }

        /* Forgot password panel */
        .forgot-panel { display: none; }
        .forgot-panel.active { display: block; }
        .login-panel { display: block; }
        .login-panel.hidden { display: none; }

        .back-link {
            font-size: 13px;
            color: #1a5c40;
            cursor: pointer;
            font-weight: 600;
            background: none;
            border: none;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>🌾 AgriSense</h1>
            <p>Wheat Disease Detection System</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="{{ 'success' if category == 'success' else 'alert' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Login Panel -->
        <div class="login-panel" id="loginPanel">
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="input-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>

            <div class="links" style="margin-top:14px;">
                <a href="#" onclick="toggleForgot()">Forgot Password?</a>
            </div>

            <div class="divider"></div>

            <div class="links">
                Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
            </div>
        </div>

        <!-- Forgot Password Panel -->
        <div class="forgot-panel" id="forgotPanel">
            <button class="back-link" onclick="toggleForgot()">← Back to Login</button>
            <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                <div class="input-group">
                    <input type="email" name="email" placeholder="Enter your Email" required>
                </div>
                <div class="input-group">
                    <input type="password" name="new_password" placeholder="New Password" required>
                </div>
                <div class="input-group">
                    <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
                </div>
                <button type="submit" class="btn">Reset Password</button>
            </form>
        </div>
    </div>

    <script>
        function toggleForgot() {
            document.getElementById('loginPanel').classList.toggle('hidden');
            document.getElementById('forgotPanel').classList.toggle('active');
        }
    </script>
</body>
</html>
