<!DOCTYPE html>
<html>
<head>
    <title>Wheat Disease Spread Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

  <script>
    var map = L.map('map').setView([20.5937, 78.9629], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const diseaseColors = {
    "Healthy": "green",
    "WheatBlast": "red",
    "FusariumFootRot": "orange",
    "BlackPoint": "brown",
    "LeafBlight": "purple"
};

fetch('/api/disease-reports')
    .then(res => res.json())
    .then(data => {
        console.log("Total reports:", data.length);
        data.forEach((report, index) => {
            const angle = (index * 137.5) * (Math.PI / 180);
            const radius = 0.02 * (1 + Math.floor(index / 8));
            const offsetLat = report.lat + radius * Math.cos(angle);
            const offsetLng = report.lng + radius * Math.sin(angle);
            const color = diseaseColors[report.disease] || "blue";

            L.circleMarker([offsetLat, offsetLng], {
                color: color,
                fillColor: color,
                fillOpacity: 0.8,
                radius: 10
            }).addTo(map)
            .bindPopup(`<b>${report.disease}</b><br>Farmer: ${report.farmer_name}<br>${report.time}`);
        });
    });
  </script>
</body>
</html>
